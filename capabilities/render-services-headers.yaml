naftiko: 1.0.0-alpha2
info:
  label: Render Public API — Services - Headers
  description: 'Render Public API — Services - Headers. 4 operations. Lead operation: List header rules. Self-contained Naftiko
    capability covering one Render business surface.'
  tags:
  - Render
  - Services - Headers
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    RENDER_API_KEY: RENDER_API_KEY
capability:
