naftiko: 1.0.0-alpha2
info:
  label: Render Public API — Disks
  description: 'Render Public API — Disks. 7 operations. Lead operation: List disks. Self-contained Naftiko capability covering
    one Render business surface.'
  tags:
  - Render
  - Disks
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    RENDER_API_KEY: RENDER_API_KEY
capability:
  consumes:
  - type: http
    namespace: render-disks
    baseUri: https://api.render.com/v1
    description: Render Public API — Disks business capability. Self-contained, no shared references.
    resources:
    - name: disks
      path: /disks
      operations:
      - name: listdisks
        method: GET
        description: List disks
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: diskId
          in: query
          type: array
          description: Filter by disk IDs
      - name: adddisk
        method: POST
        description: Add disk
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: disks-diskId
      path: /disks/{diskId}
      operations:
      - name: retrievedisk
        method: GET
        description: Retrieve disk
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updatedisk
        method: PATCH
        description: Update disk
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletedisk
        method: DELETE
        description: Delete disk
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: disks-diskId-snapshots
      path: /disks/{diskId}/snapshots
      operations:
      - name: listsnapshots
        method: GET
        description: List snapshots
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: disks-diskId-snapshots-restore
      path: /disks/{diskId}/snapshots/restore
      operations:
      - name: restoresnapshot
        method: POST
        description: Restore snapshot
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.RENDER_API_KEY}}'
  exposes:
  - type: rest
    namespace: render-disks-rest
    port: 8080
    description: REST adapter for Render Public API — Disks. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/disks
      name: disks
      description: REST surface for disks.
      operations:
      - method: GET
        name: listdisks
        description: List disks
        call: render-disks.listdisks
        with:
          diskId: rest.diskId
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: adddisk
        description: Add disk
        call: render-disks.adddisk
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/disks/{diskid}
      name: disks-diskid
      description: REST surface for disks-diskId.
      operations:
      - method: GET
        name: retrievedisk
        description: Retrieve disk
        call: render-disks.retrievedisk
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: updatedisk
        description: Update disk
        call: render-disks.updatedisk
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletedisk
        description: Delete disk
        call: render-disks.deletedisk
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/disks/{diskid}/snapshots
      name: disks-diskid-snapshots
      description: REST surface for disks-diskId-snapshots.
      operations:
      - method: GET
        name: listsnapshots
        description: List snapshots
        call: render-disks.listsnapshots
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/disks/{diskid}/snapshots/restore
      name: disks-diskid-snapshots-restore
      description: REST surface for disks-diskId-snapshots-restore.
      operations:
      - method: POST
        name: restoresnapshot
        description: Restore snapshot
        call: render-disks.restoresnapshot
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: render-disks-mcp
    port: 9090
    transport: http
    description: MCP adapter for Render Public API — Disks. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-disks
      description: List disks
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: render-disks.listdisks
      with:
        diskId: tools.diskId
      outputParameters:
      - type: object
        mapping: $.
    - name: add-disk
      description: Add disk
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: render-disks.adddisk
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: retrieve-disk
      description: Retrieve disk
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: render-disks.retrievedisk
      outputParameters:
      - type: object
        mapping: $.
    - name: update-disk
      description: Update disk
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: render-disks.updatedisk
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-disk
      description: Delete disk
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: render-disks.deletedisk
      outputParameters:
      - type: object
        mapping: $.
    - name: list-snapshots
      description: List snapshots
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: render-disks.listsnapshots
      outputParameters:
      - type: object
        mapping: $.
    - name: restore-snapshot
      description: Restore snapshot
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: render-disks.restoresnapshot
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
