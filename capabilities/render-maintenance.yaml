    resources:
    - path: /v1/maintenance
      name: maintenance
      description: REST surface for maintenance.
      operations:
      - method: GET
        name: listmaintenance
        description: List maintenance runs
        call: render-maintenance.listmaintenance
        with:
          resourceId: rest.resourceId
          state: rest.state
