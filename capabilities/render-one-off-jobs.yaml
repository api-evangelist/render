naftiko: 1.0.0-alpha2
info:
  label: Render Public API — One-Off Jobs
  description: 'Render Public API — One-Off Jobs. 4 operations. Lead operation: List jobs. Self-contained Naftiko capability
    covering one Render business surface.'
  tags:
  - Render
  - One-Off Jobs
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    RENDER_API_KEY: RENDER_API_KEY
capability:
  consumes:
  - type: http
    namespace: render-one-off-jobs
    baseUri: https://api.render.com/v1
    description: Render Public API — One-Off Jobs business capability. Self-contained, no shared references.
    resources:
    - name: services-serviceId-jobs
      path: /services/{serviceId}/jobs
      operations:
      - name: listjob
        method: GET
        description: List jobs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: status
          in: query
          type: array
          description: Filter for the status of the job (`pending`, `running`, `succeeded`, `failed`, or `canceled`)
        - name: createdBefore
          in: query
          type: string
          description: Filter for jobs created before a certain time (specified as an ISO 8601 timestamp)
        - name: createdAfter
          in: query
          type: string
          description: Filter for jobs created after a certain time (specified as an ISO 8601 timestamp)
        - name: startedBefore
          in: query
          type: string
          description: Filter for jobs started before a certain time (specified as an ISO 8601 timestamp)
        - name: startedAfter
          in: query
          type: string
          description: Filter for jobs started after a certain time (specified as an ISO 8601 timestamp)
        - name: finishedBefore
          in: query
          type: string
          description: Filter for jobs finished before a certain time (specified as an ISO 8601 timestamp)
        - name: finishedAfter
          in: query
          type: string
          description: Filter for jobs finished after a certain time (specified as an ISO 8601 timestamp)
      - name: postjob
        method: POST
        description: Create job
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: services-serviceId-jobs-jobId
      path: /services/{serviceId}/jobs/{jobId}
      operations:
      - name: retrievejob
        method: GET
        description: Retrieve job
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: services-serviceId-jobs-jobId-cancel
      path: /services/{serviceId}/jobs/{jobId}/cancel
      operations:
      - name: canceljob
        method: POST
        description: Cancel running job
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.RENDER_API_KEY}}'
  exposes:
  - type: rest
    namespace: render-one-off-jobs-rest
    port: 8080
    description: REST adapter for Render Public API — One-Off Jobs. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/services/{serviceid}/jobs
      name: services-serviceid-jobs
      description: REST surface for services-serviceId-jobs.
      operations:
      - method: GET
        name: listjob
        description: List jobs
        call: render-one-off-jobs.listjob
        with:
          status: rest.status
          createdBefore: rest.createdBefore
          createdAfter: rest.createdAfter
          startedBefore: rest.startedBefore
          startedAfter: rest.startedAfter
          finishedBefore: rest.finishedBefore
          finishedAfter: rest.finishedAfter
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: postjob
        description: Create job
        call: render-one-off-jobs.postjob
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/services/{serviceid}/jobs/{jobid}
      name: services-serviceid-jobs-jobid
      description: REST surface for services-serviceId-jobs-jobId.
      operations:
      - method: GET
        name: retrievejob
        description: Retrieve job
        call: render-one-off-jobs.retrievejob
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/services/{serviceid}/jobs/{jobid}/cancel
      name: services-serviceid-jobs-jobid-cancel
      description: REST surface for services-serviceId-jobs-jobId-cancel.
      operations:
      - method: POST
        name: canceljob
        description: Cancel running job
        call: render-one-off-jobs.canceljob
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: render-one-off-jobs-mcp
    port: 9090
    transport: http
    description: MCP adapter for Render Public API — One-Off Jobs. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-jobs
      description: List jobs
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: render-one-off-jobs.listjob
      with:
        status: tools.status
        createdBefore: tools.createdBefore
        createdAfter: tools.createdAfter
        startedBefore: tools.startedBefore
        startedAfter: tools.startedAfter
        finishedBefore: tools.finishedBefore
        finishedAfter: tools.finishedAfter
      outputParameters:
      - type: object
        mapping: $.
    - name: create-job
      description: Create job
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: render-one-off-jobs.postjob
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: retrieve-job
      description: Retrieve job
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: render-one-off-jobs.retrievejob
      outputParameters:
      - type: object
        mapping: $.
    - name: cancel-running-job
      description: Cancel running job
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: render-one-off-jobs.canceljob
      outputParameters:
      - type: object
        mapping: $.
