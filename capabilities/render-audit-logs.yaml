naftiko: 1.0.0-alpha2
info:
  label: Render Public API — Audit Logs
  description: 'Render Public API — Audit Logs. 2 operations. Lead operation: List organization audit logs. Self-contained
    Naftiko capability covering one Render business surface.'
  tags:
  - Render
  - Audit Logs
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    RENDER_API_KEY: RENDER_API_KEY
capability:
  consumes:
  - type: http
    namespace: render-audit-logs
    baseUri: https://api.render.com/v1
    description: Render Public API — Audit Logs business capability. Self-contained, no shared references.
    resources:
    - name: organizations-orgId-audit-logs
      path: /organizations/{orgId}/audit-logs
      operations:
      - name: listorganizationauditlogs
        method: GET
        description: List organization audit logs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: startTime
          in: query
          type: string
          description: Start time for filtering audit logs (ISO 8601 format)
        - name: endTime
          in: query
          type: string
          description: End time for filtering audit logs (ISO 8601 format)
    - name: owners-ownerId-audit-logs
      path: /owners/{ownerId}/audit-logs
      operations:
      - name: listownerauditlogs
        method: GET
        description: List workspace audit logs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: startTime
          in: query
          type: string
          description: Start time for filtering audit logs (ISO 8601 format)
        - name: endTime
          in: query
          type: string
          description: End time for filtering audit logs (ISO 8601 format)
    authentication:
      type: bearer
      token: '{{env.RENDER_API_KEY}}'
  exposes:
  - type: rest
    namespace: render-audit-logs-rest
    port: 8080
    description: REST adapter for Render Public API — Audit Logs. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/organizations/{orgid}/audit-logs
      name: organizations-orgid-audit-logs
      description: REST surface for organizations-orgId-audit-logs.
      operations:
      - method: GET
        name: listorganizationauditlogs
        description: List organization audit logs
        call: render-audit-logs.listorganizationauditlogs
        with:
          startTime: rest.startTime
          endTime: rest.endTime
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/owners/{ownerid}/audit-logs
      name: owners-ownerid-audit-logs
      description: REST surface for owners-ownerId-audit-logs.
      operations:
      - method: GET
        name: listownerauditlogs
        description: List workspace audit logs
        call: render-audit-logs.listownerauditlogs
        with:
          startTime: rest.startTime
          endTime: rest.endTime
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: render-audit-logs-mcp
    port: 9090
    transport: http
    description: MCP adapter for Render Public API — Audit Logs. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-organization-audit-logs
      description: List organization audit logs
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: render-audit-logs.listorganizationauditlogs
      with:
        startTime: tools.startTime
        endTime: tools.endTime
      outputParameters:
      - type: object
        mapping: $.
    - name: list-workspace-audit-logs
      description: List workspace audit logs
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: render-audit-logs.listownerauditlogs
      with:
        startTime: tools.startTime
        endTime: tools.endTime
      outputParameters:
      - type: object
        mapping: $.
