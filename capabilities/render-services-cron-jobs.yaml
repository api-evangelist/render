  - type: http
    namespace: render-services-cron-jobs
    baseUri: https://api.render.com/v1
    description: Render Public API — Services - Cron Jobs business capability. Self-contained, no shared references.
    resources:
    - name: cron-jobs-cronJobId-runs
      path: /cron-jobs/{cronJobId}/runs
      operations:
      - name: runcronjob
        method: POST
        description: Trigger cron job run
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: cancelcronjobrun
        method: DELETE
        description: Cancel running cron job
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.RENDER_API_KEY}}'
  exposes:
  - type: rest
    namespace: render-services-cron-jobs-rest
    port: 8080
    description: REST adapter for Render Public API — Services - Cron Jobs. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/cron-jobs/{cronjobid}/runs
      name: cron-jobs-cronjobid-runs
      description: REST surface for cron-jobs-cronJobId-runs.
      operations:
      - method: POST
        name: runcronjob
        description: Trigger cron job run
        call: render-services-cron-jobs.runcronjob
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: cancelcronjobrun
        description: Cancel running cron job
        call: render-services-cron-jobs.cancelcronjobrun
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: render-services-cron-jobs-mcp
    port: 9090
    transport: http
    description: MCP adapter for Render Public API — Services - Cron Jobs. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: trigger-cron-job-run
      description: Trigger cron job run
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: render-services-cron-jobs.runcronjob
      outputParameters:
      - type: object
        mapping: $.
    - name: cancel-running-cron-job
      description: Cancel running cron job
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: render-services-cron-jobs.cancelcronjobrun
      outputParameters:
      - type: object
        mapping: $.
