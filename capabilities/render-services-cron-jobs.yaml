naftiko: 1.0.0-alpha2
info:
  label: Render Public API — Services - Cron Jobs
  description: 'Render Public API — Services - Cron Jobs. 2 operations. Lead operation: Trigger cron job run. Self-contained
    Naftiko capability covering one Render business surface.'
  tags:
  - Render
  - Services - Cron Jobs
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    RENDER_API_KEY: RENDER_API_KEY
capability:
