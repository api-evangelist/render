naftiko: 1.0.0-alpha2
info:
  label: Render Public API — Webhooks
  description: 'Render Public API — Webhooks. 6 operations. Lead operation: Create a webhook. Self-contained Naftiko capability
    covering one Render business surface.'
  tags:
  - Render
  - Webhooks
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    RENDER_API_KEY: RENDER_API_KEY
capability:
  consumes:
  - type: http
    namespace: render-webhooks
    baseUri: https://api.render.com/v1
    description: Render Public API — Webhooks business capability. Self-contained, no shared references.
    resources:
    - name: webhooks
      path: /webhooks
      operations:
      - name: createwebhook
        method: POST
        description: Create a webhook
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: listwebhooks
        method: GET
        description: List webhooks
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: webhooks-webhookId
      path: /webhooks/{webhookId}
      operations:
      - name: retrievewebhook
        method: GET
        description: Retrieve a webhook
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updatewebhook
        method: PATCH
        description: Update a webhook
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletewebhook
        method: DELETE
        description: Delete a webhook
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: webhooks-webhookId-events
      path: /webhooks/{webhookId}/events
      operations:
      - name: listwebhookevents
        method: GET
        description: List webhook events
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: sentBefore
          in: query
          type: string
          description: Filter events sent before this time (specified as an ISO 8601 timestamp)
        - name: sentAfter
          in: query
          type: string
          description: Filter for resources sent after a certain time (specified as an ISO 8601 timestamp)
    authentication:
      type: bearer
      token: '{{env.RENDER_API_KEY}}'
  exposes:
  - type: rest
    namespace: render-webhooks-rest
    port: 8080
    description: REST adapter for Render Public API — Webhooks. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/webhooks
      name: webhooks
      description: REST surface for webhooks.
      operations:
      - method: POST
        name: createwebhook
        description: Create a webhook
        call: render-webhooks.createwebhook
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: listwebhooks
        description: List webhooks
        call: render-webhooks.listwebhooks
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/webhooks/{webhookid}
      name: webhooks-webhookid
      description: REST surface for webhooks-webhookId.
      operations:
      - method: GET
        name: retrievewebhook
        description: Retrieve a webhook
        call: render-webhooks.retrievewebhook
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: updatewebhook
        description: Update a webhook
        call: render-webhooks.updatewebhook
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletewebhook
        description: Delete a webhook
        call: render-webhooks.deletewebhook
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/webhooks/{webhookid}/events
      name: webhooks-webhookid-events
      description: REST surface for webhooks-webhookId-events.
      operations:
      - method: GET
        name: listwebhookevents
        description: List webhook events
        call: render-webhooks.listwebhookevents
        with:
          sentBefore: rest.sentBefore
          sentAfter: rest.sentAfter
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: render-webhooks-mcp
    port: 9090
    transport: http
    description: MCP adapter for Render Public API — Webhooks. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: create-webhook
      description: Create a webhook
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: render-webhooks.createwebhook
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: list-webhooks
      description: List webhooks
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: render-webhooks.listwebhooks
      outputParameters:
      - type: object
        mapping: $.
    - name: retrieve-webhook
      description: Retrieve a webhook
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: render-webhooks.retrievewebhook
      outputParameters:
      - type: object
        mapping: $.
    - name: update-webhook
      description: Update a webhook
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: render-webhooks.updatewebhook
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-webhook
      description: Delete a webhook
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: render-webhooks.deletewebhook
      outputParameters:
      - type: object
        mapping: $.
    - name: list-webhook-events
      description: List webhook events
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: render-webhooks.listwebhookevents
      with:
        sentBefore: tools.sentBefore
        sentAfter: tools.sentAfter
      outputParameters:
      - type: object
        mapping: $.
