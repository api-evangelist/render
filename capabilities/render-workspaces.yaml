naftiko: 1.0.0-alpha2
info:
  label: Render Public API — Workspaces
  description: 'Render Public API — Workspaces. 5 operations. Lead operation: List workspaces. Self-contained Naftiko capability
    covering one Render business surface.'
  tags:
  - Render
  - Workspaces
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    RENDER_API_KEY: RENDER_API_KEY
capability:
  consumes:
  - type: http
    namespace: render-workspaces
    baseUri: https://api.render.com/v1
    description: Render Public API — Workspaces business capability. Self-contained, no shared references.
    resources:
    - name: owners
      path: /owners
      operations:
      - name: listowners
        method: GET
        description: List workspaces
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: query
          type: array
          description: Only return workspaces with one of the provided names. Only exact matches are returned.
        - name: email
          in: query
          type: array
          description: Only return workspaces owned by one of the provided email addresses.
    - name: owners-ownerId
      path: /owners/{ownerId}
      operations:
      - name: retrieveowner
        method: GET
        description: Retrieve workspace
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: owners-ownerId-members
      path: /owners/{ownerId}/members
      operations:
      - name: retrieveownermembers
        method: GET
        description: List workspace members
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: owners-ownerId-members-userId
      path: /owners/{ownerId}/members/{userId}
      operations:
      - name: updateworkspacemember
        method: PATCH
        description: Update workspace member role
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: removeworkspacemember
        method: DELETE
        description: Remove workspace member
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.RENDER_API_KEY}}'
  exposes:
  - type: rest
    namespace: render-workspaces-rest
    port: 8080
    description: REST adapter for Render Public API — Workspaces. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/owners
      name: owners
      description: REST surface for owners.
      operations:
      - method: GET
        name: listowners
        description: List workspaces
        call: render-workspaces.listowners
        with:
          name: rest.name
          email: rest.email
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/owners/{ownerid}
      name: owners-ownerid
      description: REST surface for owners-ownerId.
      operations:
      - method: GET
        name: retrieveowner
        description: Retrieve workspace
        call: render-workspaces.retrieveowner
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/owners/{ownerid}/members
      name: owners-ownerid-members
      description: REST surface for owners-ownerId-members.
      operations:
      - method: GET
        name: retrieveownermembers
        description: List workspace members
        call: render-workspaces.retrieveownermembers
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/owners/{ownerid}/members/{userid}
      name: owners-ownerid-members-userid
      description: REST surface for owners-ownerId-members-userId.
      operations:
      - method: PATCH
        name: updateworkspacemember
        description: Update workspace member role
        call: render-workspaces.updateworkspacemember
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: removeworkspacemember
        description: Remove workspace member
        call: render-workspaces.removeworkspacemember
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: render-workspaces-mcp
    port: 9090
    transport: http
    description: MCP adapter for Render Public API — Workspaces. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-workspaces
      description: List workspaces
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: render-workspaces.listowners
      with:
        name: tools.name
        email: tools.email
      outputParameters:
      - type: object
        mapping: $.
    - name: retrieve-workspace
      description: Retrieve workspace
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: render-workspaces.retrieveowner
      outputParameters:
      - type: object
        mapping: $.
    - name: list-workspace-members
      description: List workspace members
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: render-workspaces.retrieveownermembers
      outputParameters:
      - type: object
        mapping: $.
    - name: update-workspace-member-role
      description: Update workspace member role
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: render-workspaces.updateworkspacemember
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: remove-workspace-member
      description: Remove workspace member
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: render-workspaces.removeworkspacemember
      outputParameters:
      - type: object
        mapping: $.
