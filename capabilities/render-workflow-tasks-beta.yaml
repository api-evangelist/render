      description: List tasks
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: render-workflow-tasks-beta.listtasks
      outputParameters:
      - type: object
        mapping: $.
    - name: retrieve-task
      description: Retrieve task
