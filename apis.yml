aid: render
name: Render
description: Render is a cloud platform for building and running applications and websites with automatic
  Git-based deployments. It provides managed infrastructure for web services, static sites, background
  workers, cron jobs, private services, PostgreSQL databases, Redis/Key-Value stores, and persistent disks.
  The Render API enables programmatic control of all platform resources including service deployments,
  scaling, environment configuration, custom domains, blueprints, logging, metrics, and workflow automation.
