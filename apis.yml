apis:
  - aid: render:render-api
    name: Render API
    description: The Render Public API enables full programmatic management of Render services, databases,
      and infrastructure. It supports deploying web services, static sites, background workers, cron jobs,
      and private services; managing PostgreSQL and Key-Value databases; configuring environment variables,
      secret files, custom domains, and blueprints; scaling and autoscaling services; streaming logs and
      metrics; and orchestrating multi-service workflows. Authentication uses a Bearer API key from the
      Render Dashboard.
    humanURL: https://render.com/docs/api
